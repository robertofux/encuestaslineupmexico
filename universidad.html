<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Encuesta | Cinépolis Universidad Harvest Rush;</title>
    <style>
        :root {
            --primary: #0b2343; 
            --accent: #ffcc00;  
            --bg: #f4f7f9;
            --text: #333;
            --disabled: #cccccc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo {
            max-width: 150px;
            height: auto;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.3rem;
            color: var(--primary);
            margin: 0;
            line-height: 1.2;
        }

        .question-block {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .question-text {
            font-weight: 700;
            margin-bottom: 15px;
            display: block;
            font-size: 1rem;
            line-height: 1.4;
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Estilo optimizado para Touch en iPhone */
        .option-label {
            display: block;
            position: relative;
            padding: 14px 15px 14px 50px;
            background: #ffffff;
            border: 2px solid #edf2f7;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
            -webkit-user-select: none;
            user-select: none;
        }

        .option-label:active {
            background: #f7fafc;
            transform: scale(0.98);
        }

        .option-label input {
            position: absolute;
            opacity: 0;
        }

        .checkmark {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            height: 22px;
            width: 22px;
            background-color: #fff;
            border-radius: 50%;
            border: 2px solid #cbd5e0;
        }

        .option-label input:checked ~ .checkmark {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .option-label input:checked ~ .checkmark:after {
            content: "";
            position: absolute;
            top: 6px;
            left: 6px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: white;
        }

        /* Estado seleccionado de la tarjeta */
        .option-label.selected {
            border-color: var(--primary);
            background-color: #f0f7ff;
        }

        .btn-submit {
            background-color: var(--disabled);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            width: 100%;
            cursor: not-allowed;
            transition: all 0.3s ease;
            margin-top: 10px;
            -webkit-appearance: none;
        }

        .btn-submit.active {
            background-color: var(--primary);
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(11, 35, 67, 0.2);
        }

        #loading, #success-msg {
            text-align: center;
            padding: 40px 0;
            display: none;
        }

        #success-msg h2 { color: #28a745; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="survey-content">
        <div class="header">
            <img id="client-logo" src="" alt="Logo" class="logo" style="display:none;">
            <h1 id="survey-title">Cargando...</h1>
        </div>

        <form id="qa-form">
            <div id="questions-container"></div>
            <button type="submit" class="btn-submit" id="btn-envio" disabled>Enviar Respuestas</button>
        </form>
    </div>

    <div id="loading">
        <h3>🚀 Enviando...</h3>
        <p>Guardando tus respuestas en el sistema.</p>
    </div>

    <div id="success-msg">
        <h2>¡Registro Exitoso!</h2>
        <p>Gracias por tu participación.</p>
        <button class="btn-submit active" onclick="location.reload()">Siguiente Encuesta</button>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const URL_WEBSERVICE = "https://script.google.com/macros/s/AKfycbympyQiEy7SAi6aWxG0fgmHmNB8bGbsNLoFKywsT3N3wypbxhgQ0AOOpdlW77nDrpAfUw/exec";
    const URL_POST = "https://script.google.com/macros/s/AKfycbympyQiEy7SAi6aWxG0fgmHmNB8bGbsNLoFKywsT3N3wypbxhgQ0AOOpdlW77nDrpAfUw/exec";
    const NOMBRE_ENCUESTA_OBJETIVO = "Cinepolis Universidad Harvest Rush 2026";
    

    let currentSurveyData = null;

    window.onload = async () => {
        try {
            const response = await fetch(URL_WEBSERVICE);
            const json = await response.json();
            currentSurveyData = json.Encuesta.find(e => e.NombreEncuesta === NOMBRE_ENCUESTA_OBJETIVO);

            if (!currentSurveyData) {
                document.getElementById('survey-title').innerText = "Encuesta no disponible";
                return;
            }
            renderSurvey(currentSurveyData);
        } catch (error) {
            document.getElementById('survey-title').innerText = "Error de conexión";
        }
    };

    function renderSurvey(data) {
        document.getElementById('survey-title').innerText = data.NombreEncuesta;
        if (data.LinkLogoCliente) {
            const logo = document.getElementById('client-logo');
            logo.src = data.LinkLogoCliente;
            logo.style.display = "inline-block";
        }

        const container = document.getElementById('questions-container');
        data.Data.forEach((q, qIndex) => {
            const block = document.createElement('div');
            block.className = 'question-block';
            block.innerHTML = `
                <span class="question-text">${qIndex + 1}. ${q.Question}</span>
                <div class="options-group">
                    ${q.Answers.map((ans, aIndex) => `
                        <label class="option-label" id="label-q${qIndex}-a${aIndex}">
                            <input type="radio" name="q${qIndex}" value="${ans}" 
                                   onchange="handleSelection(${qIndex}, ${aIndex})">
                            <span class="checkmark"></span>
                            ${ans}
                        </label>
                    `).join('')}
                </div>
            `;
            container.appendChild(block);
        });
    }

    // Maneja el cambio visual y activa la validación
    function handleSelection(qIndex, aIndex) {
        // Remover clase seleccionada de todos los labels de esta pregunta
        const labels = document.querySelectorAll(`[id^="label-q${qIndex}-"]`);
        labels.forEach(l => l.classList.remove('selected'));
        
        // Añadir al seleccionado
        document.getElementById(`label-q${qIndex}-a${aIndex}`).classList.add('selected');
        
        checkFormValidity();
    }

    function checkFormValidity() {
        const btn = document.getElementById('btn-envio');
        const totalQuestions = currentSurveyData.Data.length;
        let answered = 0;

        for (let i = 0; i < totalQuestions; i++) {
            if (document.querySelector(`input[name="q${i}"]:checked`)) {
                answered++;
            }
        }

        if (answered === totalQuestions) {
            btn.disabled = false;
            btn.classList.add('active');
        } else {
            btn.disabled = true;
            btn.classList.remove('active');
        }
    }

    document.getElementById('qa-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-envio');
        const formArea = document.getElementById('survey-content');
        const loadingArea = document.getElementById('loading');
        const successArea = document.getElementById('success-msg');

        btn.disabled = true;
        
        let qaString = "";
        currentSurveyData.Data.forEach((q, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`).value;
            qaString += `${q.Question}#${selected}¦`;
        });

        // Identificación del dispositivo para la columna "Device"
        const deviceID = `${navigator.platform} (${/iPhone|iPad|iPod/.test(navigator.userAgent) ? 'iOS' : 'Web'})`;

        const payload = {
            timeStamp: new Date().toLocaleString('es-MX'),
            device: deviceID,
            encuesta: currentSurveyData.NombreEncuesta,
            cantidadPreguntas: currentSurveyData.Data.length,
            preguntasRespuestas: qaString
        };

        formArea.style.display = "none";
        loadingArea.style.display = "block";

        try {
            await fetch(URL_POST, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload)
            });
            loadingArea.style.display = "none";
            successArea.style.display = "block";
        } catch (error) {
            alert("Error al enviar. Intenta de nuevo.");
            formArea.style.display = "block";
            loadingArea.style.display = "none";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
